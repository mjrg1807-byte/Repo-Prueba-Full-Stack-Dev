<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Container</title>
    <link rel="stylesheet" href="Grid-CSS/main.css">
</head>

<!-- Enlaces de interés:
https://developer.mozilla.org/es/docs/Web/CSS/CSS_grid_layout -->

<body>

    <!-- Un Grid Container es un contenedor que utiliza la propiedad CSS display: grid; para organizar sus elementos hijos en una cuadrícula bidimensional. Los elementos dentro de un Grid Container se distribuyen en filas y columnas, lo que permite crear diseños complejos y estructurados de manera sencilla. El Grid Layout ofrece una gran flexibilidad para definir el tamaño y la posición de los elementos, facilitando la creación de diseños responsivos y adaptativos. -->

    <div class="container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>
        <!--
        <div class="item6">6</div>
        <div class="item7">7</div>
        <div class="item8">8</div>
        <div class="item9">9</div>
        <div class="item10">10</div>
        -->
    </div>

</body>
</html>
