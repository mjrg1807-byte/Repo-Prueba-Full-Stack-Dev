<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Container</title>
    <link rel="stylesheet" href="Flexbox-CSS/main.css">
</head>

<!--Enlaces de interés:
- https://developer.mozilla.org/es/docs/Web/CSS/CSS_flexible_box_layout/Basic_concepts_of_flexbox
- https://developer.mozilla.org/es/docs/Web/CSS/flex -->
    
<body>

    <!-- Un Flexbox Container es un contenedor que utiliza la propiedad CSS display: flex; para organizar sus elementos hijos de manera flexible y eficiente. Los elementos dentro de un Flexbox Container se distribuyen a lo largo de un eje principal, que puede ser horizontal (row) o vertical (column), dependiendo de la propiedad flex-direction. Esto permite que los elementos se ajusten automáticamente al espacio disponible, facilitando la creación de diseños responsivos y adaptativos. -->

    <div class="flex-container">
        <div class="item1">1</div>
        <div class="item2">2</div>
        <div class="item3">3</div>
        <div class="item4">4</div>
        <div class="item5">5</div>

        <div class="item6">6</div>

        <div class="item10">10</div>

    </div>

</html>
